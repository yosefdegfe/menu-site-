<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Le Petit Cafe - Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=Noto+Sans+Ethiopic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['DM Sans', 'sans-serif'],
            amharic: ['Noto Sans Ethiopic', 'DM Sans', 'sans-serif'],
          },
          colors: {
            cafe: {
              50: '#fdf8f3', 100: '#f5e6d3', 200: '#e8c9a8',
              300: '#d4a574', 400: '#c28a52', 500: '#a66d3a',
              600: '#8b5a2b', 700: '#6b4423', 800: '#4a2e17',
              900: '#2d1a0b', 950: '#1a0f06',
            },
            cream: '#faf6f1',
            espresso: '#3d2314',
            latte: '#c4956a',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #faf6f1; }
    .font-serif { font-family: 'Cormorant Garamond', serif; }
    .font-amharic { font-family: 'Noto Sans Ethiopic', 'DM Sans', sans-serif; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .card-hover { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .card-hover:active { transform: translateY(-2px); }
    .img-overlay::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(61,35,20,0.6) 0%, transparent 50%); pointer-events: none; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .glass { background: rgba(250, 246, 241, 0.9); backdrop-filter: blur(20px); }
    .modal-overlay { transition: opacity 0.3s; }
    .modal-overlay.hidden { opacity: 0; pointer-events: none; }
    .modal-overlay:not(.hidden) { opacity: 1; pointer-events: auto; }
    .modal-sheet { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .modal-overlay.hidden .modal-sheet { transform: translateY(100%); }
    .modal-overlay:not(.hidden) .modal-sheet { transform: translateY(0); }
    * { direction: ltr !important; unicode-bidi: normal !important; }
    .img-upload-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; border: 2px dashed #e8c9a8; }
    .img-fallback { background: linear-gradient(135deg, #f5e6d3 0%, #e8c9a8 100%); }
  </style>
<base target="_blank">
<base target="_blank">
</head>
<body class="antialiased text-espresso">

  <!-- Splash -->
  <div id="splash" class="fixed inset-0 z-[9999] bg-cafe-950 flex flex-col items-center justify-center transition-opacity duration-700">
    <div class="w-28 h-28 rounded-full bg-gradient-to-br from-latte to-cafe-600 flex items-center justify-center shadow-2xl mb-6">
      <i class="fas fa-mug-hot text-4xl text-cream"></i>
    </div>
    <h1 class="font-serif text-4xl text-cream mb-2">Le Petit Cafe</h1>
    <p class="text-cafe-300 text-sm tracking-widest uppercase">Est. 2016</p>
  </div>

  <div class="max-w-md mx-auto min-h-screen relative bg-cream">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-cafe-100">
      <div class="px-5 pt-4 pb-3">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-cafe-600 to-cafe-800 flex items-center justify-center shadow-lg">
              <i class="fas fa-mug-hot text-cream text-lg"></i>
            </div>
            <div>
              <h1 class="font-serif text-xl font-bold text-espresso" data-en="Le Petit Cafe" data-am="Le Petit Cafe">Le Petit Cafe</h1>
              <p class="text-[10px] text-cafe-400 tracking-widest uppercase" data-en="Artisan Coffee" data-am="Artisan Coffee">Artisan Coffee</p>
            </div>
          </div>
          <button id="settingsBtn" class="w-10 h-10 rounded-full bg-white border border-cafe-100 flex items-center justify-center text-cafe-600">
            <i class="fas fa-cog text-sm"></i>
          </button>
        </div>
        <div id="categoryTabs" class="flex gap-2 overflow-x-auto hide-scroll pb-1"></div>
      </div>
    </header>

    <!-- Content -->
    <main id="content" class="px-5 pt-5 pb-28"></main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md z-50 glass border-t border-cafe-100 px-6 py-2">
      <div class="flex justify-around">
        <button id="navMenu" class="nav-item flex flex-col items-center gap-1 py-2 px-4" data-tab="menu">
          <div class="w-10 h-10 rounded-full flex items-center justify-center bg-cafe-700 text-cream shadow-lg">
            <i class="fas fa-utensils text-sm"></i>
          </div>
          <span class="text-[10px] font-semibold text-cafe-700" data-en="Menu" data-am="Menu">Menu</span>
        </button>
        <button id="navFav" class="nav-item flex flex-col items-center gap-1 py-2 px-4" data-tab="favorites">
          <div class="w-10 h-10 rounded-full flex items-center justify-center bg-cafe-100 text-cafe-400">
            <i class="fas fa-heart text-sm"></i>
          </div>
          <span class="text-[10px] font-medium text-cafe-400" data-en="Saved" data-am="Saved">Saved</span>
        </button>
        <button id="navOwner" class="nav-item flex flex-col items-center gap-1 py-2 px-4" data-tab="owner">
          <div class="w-10 h-10 rounded-full flex items-center justify-center bg-cafe-100 text-cafe-400">
            <i class="fas fa-lock text-sm"></i>
          </div>
          <span class="text-[10px] font-medium text-cafe-400" data-en="Owner" data-am="Owner">Owner</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-overlay fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-espresso/60 backdrop-blur-sm" id="settingsBackdrop"></div>
    <div class="modal-sheet absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-cream rounded-t-3xl shadow-2xl">
      <div class="p-6">
        <div class="w-12 h-1 bg-cafe-200 rounded-full mx-auto mb-6"></div>
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif text-2xl font-bold" data-en="Settings" data-am="Settings">Settings</h2>
          <button id="closeSettings" class="w-9 h-9 rounded-full bg-cafe-100 flex items-center justify-center text-cafe-600">
            <i class="fas fa-times text-sm"></i>
          </button>
        </div>
        <div class="bg-white rounded-2xl p-4 border border-cafe-100 shadow-sm">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-cafe-50 flex items-center justify-center text-cafe-600">
                <i class="fas fa-globe"></i>
              </div>
              <div>
                <h3 class="font-semibold text-sm" data-en="Language" data-am="Language">Language</h3>
                <p class="text-xs text-cafe-400 mt-0.5" data-en="English / Amharic" data-am="English / Amharic">English / Amharic</p>
              </div>
            </div>
            <button id="langToggleBtn" class="h-9 px-4 rounded-full bg-cafe-100 text-cafe-700 font-semibold text-xs">EN</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal-overlay fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-espresso/60 backdrop-blur-sm" id="authBackdrop"></div>
    <div class="modal-sheet absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-cream rounded-t-3xl shadow-2xl">
      <div class="p-6">
        <div class="w-12 h-1 bg-cafe-200 rounded-full mx-auto mb-6"></div>
        <div class="text-center mb-6">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-cafe-600 to-cafe-800 flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-shield-alt text-2xl text-cream"></i>
          </div>
          <h2 class="font-serif text-2xl font-bold mb-1" data-en="Owner Access" data-am="Owner Access">Owner Access</h2>
          <p class="text-sm text-cafe-400" data-en="Password: 1234" data-am="Password: 1234">Password: 1234</p>
        </div>
        <form id="authForm">
          <input type="password" id="ownerPassword" required placeholder="****" class="w-full h-14 px-5 rounded-2xl bg-white border-2 border-cafe-100 text-center text-2xl tracking-widest font-bold text-espresso mb-4">
          <button type="submit" class="w-full h-14 rounded-2xl bg-gradient-to-r from-cafe-600 to-cafe-700 text-cream font-semibold text-lg shadow-lg">
            <i class="fas fa-unlock mr-2"></i>
            <span data-en="Unlock" data-am="Unlock">Unlock</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Item Modal -->
  <div id="itemModal" class="modal-overlay fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-espresso/60 backdrop-blur-sm" id="itemBackdrop"></div>
    <div class="modal-sheet absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-cream rounded-t-3xl shadow-2xl max-h-[92vh] overflow-hidden flex flex-col">
      <div class="p-6 overflow-y-auto">
        <div class="w-12 h-1 bg-cafe-200 rounded-full mx-auto mb-6"></div>
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif text-2xl font-bold" id="modalTitle" data-en="Add Item" data-am="Add Item">Add Item</h2>
          <button id="closeItemModal" class="w-9 h-9 rounded-full bg-cafe-100 flex items-center justify-center text-cafe-600">
            <i class="fas fa-times text-sm"></i>
          </button>
        </div>
        <form id="itemForm">
          <input type="hidden" id="itemId">

          <!-- Image Upload -->
          <div class="mb-4">
            <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Item Image</label>
            <div class="relative">
              <input type="file" id="itemImageInput" accept="image/*" class="hidden">
              <div id="imagePreviewContainer" class="w-full h-36 rounded-2xl bg-gradient-to-br from-cafe-100 to-cafe-50 border-2 border-dashed border-cafe-200 flex flex-col items-center justify-center cursor-pointer overflow-hidden" onclick="document.getElementById('itemImageInput').click()">
                <img id="imagePreview" class="hidden w-full h-full object-cover">
                <div id="imagePlaceholder" class="flex flex-col items-center gap-2">
                  <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center shadow-sm">
                    <i class="fas fa-camera text-cafe-400 text-lg"></i>
                  </div>
                  <span class="text-xs text-cafe-400 font-medium">Tap to add photo</span>
                </div>
                <button type="button" id="removeImageBtn" class="hidden absolute top-2 right-2 w-7 h-7 rounded-full bg-red-500 text-white flex items-center justify-center shadow-md">
                  <i class="fas fa-times text-xs"></i>
                </button>
              </div>
            </div>
            <p class="text-[10px] text-cafe-400 mt-1.5">Or paste an image URL:</p>
            <input type="text" id="itemImageUrl" placeholder="https://example.com/photo.jpg" class="w-full h-10 px-4 rounded-xl bg-white border border-cafe-100 text-xs mt-1">
          </div>

          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Name (EN)</label>
              <input type="text" id="itemNameEn" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm">
            </div>
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Name (AM)</label>
              <input type="text" id="itemNameAm" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Price ($)</label>
              <input type="number" id="itemPrice" step="0.01" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm">
            </div>
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Category</label>
              <select id="itemCategory" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm">
                <option value="starters">Starters</option>
                <option value="mains">Mains</option>
                <option value="desserts">Desserts</option>
                <option value="drinks">Drinks</option>
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Description (EN)</label>
            <textarea id="itemDescEn" required rows="2" class="w-full px-4 py-3 rounded-xl bg-white border border-cafe-100 text-sm resize-none"></textarea>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Description (AM)</label>
            <textarea id="itemDescAm" required rows="2" class="w-full px-4 py-3 rounded-xl bg-white border border-cafe-100 text-sm resize-none"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Badge</label>
              <select id="itemBadge" class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm">
                <option value="">None</option>
                <option value="new">New</option>
                <option value="hot">Hot</option>
                <option value="veg">Veg</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase">Icon</label>
              <input type="text" id="itemEmoji" maxlength="2" value="🍽️" class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm text-center text-2xl">
            </div>
          </div>
          <button type="submit" class="w-full h-14 rounded-2xl bg-gradient-to-r from-cafe-600 to-cafe-700 text-cream font-semibold shadow-lg">
            <i class="fas fa-check mr-2"></i> Save Item
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Image Viewer Modal -->
  <div id="imageViewerModal" class="modal-overlay fixed inset-0 z-[300] hidden">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" id="imageViewerBackdrop"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <button id="closeImageViewer" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/20 text-white flex items-center justify-center">
        <i class="fas fa-times"></i>
      </button>
      <img id="viewerImage" class="max-w-full max-h-[80vh] rounded-2xl shadow-2xl object-contain">
    </div>
  </div>

      '9': 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=600&h=400&fit=crop'

    var menuItems = [
      { id: '1', nameEn: 'Truffle Mushroom Soup', nameAm: 'ትሩፍል እንጉዳይ ሾርባ', price: 14, category: 'starters', descEn: 'Creamy wild mushroom soup with black truffle oil and toasted sourdough.', descAm: 'በጥቁር ትሩፍል ዘይትና በተጠበሰ ሳውርዶ ዳቦ የተዘጋጀ የዱር እንጉዳይ ሾርባ።', badge: 'hot', emoji: '🍄', favorite: false, image: demoImages['1'] },
      { id: '2', nameEn: 'Burrata & Tomato', nameAm: 'ቡራታ እና ቲማቲም', price: 18, category: 'starters', descEn: 'Creamy burrata, vine-ripened tomatoes, aged balsamic, and fresh basil.', descAm: 'ክሬሚ ቡራታ፣ በወይን የተበላሸ ቲማቲም፣ የዕድሜ የገፋ ባልሳሚክ፣ እና ትሩፍ ባዚል።', badge: 'veg', emoji: '🍅', favorite: false, image: demoImages['2'] },

      { id: '4', nameEn: 'Pan-Seared Salmon', nameAm: 'የተጠበሰ ሳልሞን', price: 36, category: 'mains', descEn: 'Atlantic salmon, lemon butter, roasted asparagus, saffron risotto.', descAm: 'የአትላንቲክ ሳልሞን፣ የሎሚ ቅቤ፣ የተጠበሰ አስፓራጋስ፣ ሳፍሮን ሪዞቶ።', badge: 'new', emoji: '🐟', favorite: false, image: demoImages['4'] },
      { id: '5', nameEn: 'Mushroom Risotto', nameAm: 'እንጉዳይ ሪዞቶ', price: 28, category: 'mains', descEn: 'Arborio rice, porcini mushrooms, parmesan, white wine, and truffle oil.', descAm: 'አርቦሪዮ ሩዝ፣ ፖርቺኒ እንጉዳይ፣ ፓርሜዛን፣ ነጭ ወይን፣ እና ትሩፍል ዘይት።', badge: 'veg', emoji: '🍚', favorite: false, image: demoImages['5'] },

      { id: '7', nameEn: 'Lava Cake', nameAm: 'ላቫ ኬክ', price: 18, category: 'desserts', descEn: 'Warm chocolate cake with molten center, salted caramel, and vanilla ice cream.', descAm: 'ሞልተን ማዕከል ያለው ትኩስ ቸኮሌት ኬክ፣ የጨመቀ ካራሜል፣ እና ቫኒላ አይስ ክሬም።', badge: 'hot', emoji: '🍫', favorite: false, image: demoImages['7'] },
      { id: '8', nameEn: 'Spanish Latte', nameAm: 'ስፓኒሽ ላቴ', price: 9, category: 'drinks', descEn: 'Double espresso, sweetened condensed milk, over ice with cinnamon dust.', descAm: 'ድርብ ኢስፕሬሶ፣ የተጣፈጠ ኮንደንስድ ወተት፣ በበረዶ ላይ ከቀረፈ ዘይት ጋር።', badge: 'new', emoji: '☕', favorite: false, image: demoImages['8'] },
      { id: '9', nameEn: 'Passion Mojito', nameAm: 'ፓሽን ሞሂቶ', price: 13, category: 'drinks', descEn: 'Fresh mint, lime, passion fruit, soda water. Non-alcoholic and refreshing.', descAm: 'ትሩፍ ነነድ፣ ሎሚ፣ ፓሽን ፍሩት፣ ሶዳ ውሃ። ያለ አልኮል እና አዲስ አዲስ።', badge: 'veg', emoji: '🍹', favorite: false, image: demoImages['9'] }
    ];

    var svgPattern = "data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a66d3a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E";

    // ========== INIT ==========
    function init() {
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 700);
        }
      }, 2000);

      setupEventListeners();
      renderCategories();
      renderContent();
    }

    function setupEventListeners() {
      document.getElementById('settingsBtn').addEventListener('click', function() { openModal('settingsModal'); });
      document.getElementById('closeSettings').addEventListener('click', function() { closeModal('settingsModal'); });
      document.getElementById('settingsBackdrop').addEventListener('click', function() { closeModal('settingsModal'); });
      document.getElementById('langToggleBtn').addEventListener('click', toggleLanguage);
      document.getElementById('navMenu').addEventListener('click', function() { switchTab('menu'); });
      document.getElementById('navFav').addEventListener('click', function() { switchTab('favorites'); });
      document.getElementById('navOwner').addEventListener('click', function() { switchTab('owner'); });
      document.getElementById('authBackdrop').addEventListener('click', function() { closeModal('authModal'); });
      document.getElementById('authForm').addEventListener('submit', authenticate);
      document.getElementById('itemBackdrop').addEventListener('click', function() { closeModal('itemModal'); });
      document.getElementById('closeItemModal').addEventListener('click', function() { closeModal('itemModal'); });
      document.getElementById('itemForm').addEventListener('submit', saveItem);

      // Image upload handlers
      document.getElementById('itemImageInput').addEventListener('change', handleImageUpload);
      document.getElementById('removeImageBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        removeImage();
      });
      document.getElementById('itemImageUrl').addEventListener('input', handleImageUrl);

      // Image viewer
      document.getElementById('imageViewerBackdrop').addEventListener('click', function() { closeModal('imageViewerModal'); });
      document.getElementById('closeImageViewer').addEventListener('click', function() { closeModal('imageViewerModal'); });
    }

    // ========== IMAGE HANDLING ==========
    function handleImageUpload(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(event) {
        currentImageBase64 = event.target.result;
        showImagePreview(currentImageBase64);
        document.getElementById('itemImageUrl').value = '';
      };
      reader.readAsDataURL(file);
    }

    function handleImageUrl(e) {
      var url = e.target.value.trim();
      if (url) {
        currentImageBase64 = url;
        showImagePreview(url);
      } else {
        removeImage();
      }
    }

    function showImagePreview(src) {
      var preview = document.getElementById('imagePreview');
      var placeholder = document.getElementById('imagePlaceholder');
      var removeBtn = document.getElementById('removeImageBtn');
      preview.src = src;
      preview.classList.remove('hidden');
      placeholder.classList.add('hidden');
      removeBtn.classList.remove('hidden');
    }

    function removeImage() {
      currentImageBase64 = null;
      document.getElementById('itemImageInput').value = '';
      document.getElementById('itemImageUrl').value = '';
      var preview = document.getElementById('imagePreview');
      var placeholder = document.getElementById('imagePlaceholder');
      var removeBtn = document.getElementById('removeImageBtn');
      preview.src = '';
      preview.classList.add('hidden');
      placeholder.classList.remove('hidden');
      removeBtn.classList.add('hidden');
    }

    function openImageViewer(src) {
      document.getElementById('viewerImage').src = src;
      openModal('imageViewerModal');
    }

    // ========== RENDER ==========
    function renderCategories() {
      var tabs = document.getElementById('categoryTabs');
      var html = '';
      for (var i = 0; i < categories.length; i++) {
        var cat = categories[i];
        var isActive = currentCategory === cat.id;
        var label = currentLang === 'am' ? cat.am : cat.en;
        var activeClass = isActive ? 'bg-cafe-700 text-cream shadow-lg' : 'bg-white text-cafe-600 border border-cafe-100';
        html += '<button class="flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all ' + activeClass + '" data-cat="' + cat.id + '">';
        html += '<i class="fas ' + cat.icon + ' text-xs"></i> ' + label;
        html += '</button>';
      }
      tabs.innerHTML = html;

      var buttons = tabs.querySelectorAll('button');
      for (var j = 0; j < buttons.length; j++) {
        buttons[j].addEventListener('click', function() {
          setCategory(this.getAttribute('data-cat'));
        });
      }
    }

    function renderContent() {
      var content = document.getElementById('content');
      if (currentTab === 'menu') renderMenu(content);
      else if (currentTab === 'favorites') renderFavorites(content);
      else if (currentTab === 'owner') renderOwner(content);
    }

    function renderMenu(container) {
      var filtered = [];
      if (currentCategory === 'all') {
        filtered = menuItems;
      } else {
        for (var i = 0; i < menuItems.length; i++) {
          if (menuItems[i].category === currentCategory) filtered.push(menuItems[i]);
        }
      }

      if (filtered.length === 0) {
        container.innerHTML = emptyState('fa-utensils', currentLang === 'am' ? 'እስካሁን ምንም ዕቃዎች የሉም' : 'No items yet', currentLang === 'am' ? 'እባክዎ ከባለቤት ፓነል ዕቃዎችን ያክሉ' : 'Add items from owner panel');
        return;
      }

      var catInfo = null;
      for (var c = 0; c < categories.length; c++) {
        if (categories[c].id === currentCategory) { catInfo = categories[c]; break; }
      }

      var html = '<div class="mb-5">';
      html += '<h2 class="font-serif text-2xl font-bold flex items-center gap-2">';
      html += '<i class="fas ' + (catInfo ? catInfo.icon : 'fa-utensils') + ' text-cafe-500 text-lg"></i> ';
      html += (currentLang === 'am' ? catInfo.am : catInfo.en) + '</h2>';
      html += '<p class="text-sm text-cafe-400 mt-1">' + filtered.length + ' ' + (currentLang === 'am' ? 'ዕቃዎች' : 'items') + '</p></div>';
      html += '<div class="space-y-5">';
      for (var idx = 0; idx < filtered.length; idx++) {
        html += menuCard(filtered[idx], idx);
      }
      html += '</div>';
      container.innerHTML = html;
      addFavoriteHandlers();
      addImageClickHandlers();
    }

    function renderFavorites(container) {
      var favorites = [];
      for (var i = 0; i < menuItems.length; i++) {
        if (menuItems[i].favorite) favorites.push(menuItems[i]);
      }

      if (favorites.length === 0) {
        container.innerHTML = emptyState('fa-heart', currentLang === 'am' ? 'ምንም ተወዳጆች የሉም' : 'No favorites', currentLang === 'am' ? 'ዕቃዎችን ለማስቀመጥ ልብ ይንኩ' : 'Tap heart to save items');
        return;
      }

      var html = '<div class="mb-5">';
      html += '<h2 class="font-serif text-2xl font-bold flex items-center gap-2">';
      html += '<i class="fas fa-heart text-red-400 text-lg"></i> ' + (currentLang === 'am' ? 'የእርስዎ ተወዳጆች' : 'Your Favorites') + '</h2>';
      html += '<p class="text-sm text-cafe-400 mt-1">' + favorites.length + ' ' + (currentLang === 'am' ? 'የተቀመጡ' : 'saved') + '</p></div>';
      html += '<div class="space-y-5">';
      for (var idx = 0; idx < favorites.length; idx++) {
        html += menuCard(favorites[idx], idx);
      }
      html += '</div>';
      container.innerHTML = html;
      addFavoriteHandlers();
      addImageClickHandlers();
    }

    function renderOwner(container) {
      if (!isOwner) {
        container.innerHTML = '<div class="flex flex-col items-center justify-center py-16 text-center">' +
          '<div class="w-20 h-20 rounded-3xl bg-cafe-100 flex items-center justify-center mb-5"><i class="fas fa-lock text-3xl text-cafe-400"></i></div>' +
          '<h2 class="font-serif text-2xl font-bold mb-2">' + (currentLang === 'am' ? 'የባለቤት ፓነል' : 'Owner Panel') + '</h2>' +
          '<p class="text-sm text-cafe-400 mb-6">' + (currentLang === 'am' ? 'ምናሌን ለማስተዳደር የይለፍ ቃል ያስገቡ' : 'Enter password to manage menu') + '</p>' +
          '<button id="unlockBtn" class="h-12 px-8 rounded-2xl bg-gradient-to-r from-cafe-600 to-cafe-700 text-cream font-semibold shadow-lg">' +
          '<i class="fas fa-unlock mr-2"></i> ' + (currentLang === 'am' ? 'ክፈት' : 'Unlock') + '</button></div>';
        document.getElementById('unlockBtn').addEventListener('click', function() { openModal('authModal'); });
        return;
      }

      var html = '<div class="flex items-center justify-between mb-6">';
      html += '<h2 class="font-serif text-2xl font-bold"><i class="fas fa-shield-alt text-cafe-500 mr-2"></i> ' + (currentLang === 'am' ? 'የባለቤት ፓነል' : 'Owner Panel') + '</h2>';
      html += '<button id="addItemBtn" class="w-11 h-11 rounded-xl bg-gradient-to-br from-cafe-600 to-cafe-700 text-cream flex items-center justify-center shadow-lg">';
      html += '<i class="fas fa-plus"></i></button></div>';

      for (var c = 1; c < categories.length; c++) {
        var cat = categories[c];
        var items = [];
        for (var m = 0; m < menuItems.length; m++) {
          if (menuItems[m].category === cat.id) items.push(menuItems[m]);
        }

        html += '<div class="mb-6">';
        html += '<h3 class="text-xs font-bold text-cafe-500 uppercase tracking-widest mb-3 flex items-center gap-2">';
        html += '<i class="fas ' + cat.icon + '"></i> ' + (currentLang === 'am' ? cat.am : cat.en) + ' (' + items.length + ')</h3>';

        if (items.length === 0) html += '<p class="text-sm text-cafe-300 py-2">' + (currentLang === 'am' ? 'ምንም ዕቃዎች የሉም' : 'No items') + '</p>';

        html += '<div class="space-y-3">';
        for (var it = 0; it < items.length; it++) {
          var item = items[it];
          html += '<div class="bg-white rounded-2xl p-3 border border-cafe-100 shadow-sm flex items-center gap-3">';
          if (item.image) {
            html += '<div class="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 bg-cafe-50"><img src="' + item.image + '" class="w-full h-full object-cover" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class=text-2xl>\' + item.emoji + \'</span>\'"></div>';
          } else {
            html += '<div class="w-14 h-14 rounded-xl bg-cafe-50 flex items-center justify-center text-2xl flex-shrink-0">' + item.emoji + '</div>';
          }
          html += '<div class="flex-1 min-w-0">';
          html += '<h4 class="font-semibold text-sm truncate">' + (currentLang === 'am' ? item.nameAm : item.nameEn) + '</h4>';
          html += '<p class="text-xs text-cafe-400 mt-0.5">$' + item.price.toFixed(2) + ' - ' + (item.badge || (currentLang === 'am' ? 'መደበኛ' : 'Standard')) + '</p></div>';
          html += '<div class="flex gap-1.5">';
          html += '<button class="edit-btn w-9 h-9 rounded-lg bg-cafe-50 text-cafe-600 flex items-center justify-center" data-id="' + item.id + '">';
          html += '<i class="fas fa-pen text-xs"></i></button>';
          html += '<button class="delete-btn w-9 h-9 rounded-lg bg-red-50 text-red-400 flex items-center justify-center" data-id="' + item.id + '">';
          html += '<i class="fas fa-trash text-xs"></i></button></div></div>';
        }
        html += '</div></div>';
      }

      html += '<button id="lockPanelBtn" class="w-full h-12 rounded-2xl bg-cafe-100 text-cafe-700 font-semibold mt-4">';
      html += '<i class="fas fa-lock mr-2"></i> ' + (currentLang === 'am' ? 'ፓነል ዝጋ' : 'Lock Panel') + '</button>';
      container.innerHTML = html;

      document.getElementById('addItemBtn').addEventListener('click', openAddModal);
      document.getElementById('lockPanelBtn').addEventListener('click', function() { isOwner = false; renderContent(); });

      var editBtns = container.querySelectorAll('.edit-btn');
      for (var e = 0; e < editBtns.length; e++) {
        editBtns[e].addEventListener('click', function() { openEditModal(this.getAttribute('data-id')); });
      }
      var delBtns = container.querySelectorAll('.delete-btn');
      for (var d = 0; d < delBtns.length; d++) {
        delBtns[d].addEventListener('click', function() { deleteItem(this.getAttribute('data-id')); });
      }
    }

    function menuCard(item, index) {
      var badgeColors = { new: 'bg-amber-100 text-amber-700', hot: 'bg-red-50 text-red-500', veg: 'bg-emerald-50 text-emerald-600', '': 'hidden' };
      var badgeLabels = { new: 'NEW', hot: 'HOT', veg: 'VEG', '': '' };
      var name = currentLang === 'am' ? item.nameAm : item.nameEn;
      var desc = currentLang === 'am' ? item.descAm : item.descEn;
      var time1 = Math.floor(Math.random() * 8 + 12);
      var time2 = Math.floor(Math.random() * 10 + 20);
      var kcal = Math.floor(Math.random() * 150 + 250);
      var rating = (Math.random() * 0.5 + 4.5).toFixed(1);

      var badgeHtml = '';
      if (item.badge) {
        badgeHtml = '<div class="absolute top-4 left-4 px-3 py-1.5 rounded-full text-[10px] font-bold tracking-wider ' + badgeColors[item.badge] + '">' + badgeLabels[item.badge] + '</div>';
      }

      var catName = '';
      for (var c = 0; c < categories.length; c++) {
        if (categories[c].id === item.category) { catName = currentLang === 'am' ? categories[c].am : categories[c].en; break; }
      }

      var hasImage = item.image && item.image.length > 0;

      var html = '<div class="card-hover bg-white rounded-3xl overflow-hidden border border-cafe-100 shadow-sm" style="animation: slideUp 0.5s ' + (index * 0.08) + 's both;">';

      // Image or gradient header
      if (hasImage) {
        html += '<div class="relative h-52 overflow-hidden img-overlay cursor-pointer" onclick="openImageViewer(\'' + item.image + '\')">';
        html += '<img src="' + item.image + '" class="w-full h-full object-cover" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.img-fallback\').style.display=\'flex\'">';
        html += '<div class="img-fallback hidden absolute inset-0 flex items-center justify-center bg-gradient-to-br from-cafe-100 via-cafe-50 to-cream">';
        html += '<div class="absolute inset-0 opacity-30" style="background-image: url(' + svgPattern + ');"></div>';
        html += '<div class="w-24 h-24 rounded-full bg-white/60 backdrop-blur-sm flex items-center justify-center shadow-lg"><span class="text-5xl">' + item.emoji + '</span></div></div>';
      } else {
        html += '<div class="relative h-52 bg-gradient-to-br from-cafe-100 via-cafe-50 to-cream overflow-hidden img-overlay">';
        html += '<div class="absolute inset-0 opacity-30" style="background-image: url(' + svgPattern + ');"></div>';
        html += '<div class="absolute inset-0 flex items-center justify-center">';
        html += '<div class="w-24 h-24 rounded-full bg-white/60 backdrop-blur-sm flex items-center justify-center shadow-lg">';
        html += '<span class="text-5xl">' + item.emoji + '</span></div></div>';
      }

      html += badgeHtml;
      html += '<button class="fav-btn absolute top-4 right-4 w-10 h-10 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center shadow-md" data-id="' + item.id + '">';
      html += '<i class="fas fa-heart ' + (item.favorite ? 'text-red-400' : 'text-cafe-200') + ' text-lg"></i></button>';
      html += '<div class="absolute bottom-0 left-0 right-0 p-4 text-white z-10">';
      html += '<div class="flex items-end justify-between">';
      html += '<div><p class="text-[10px] uppercase tracking-widest opacity-80 mb-1">' + catName + '</p>';
      html += '<h3 class="font-serif text-xl font-bold leading-tight">' + name + '</h3></div>';
      html += '<div class="text-right"><span class="font-serif text-2xl font-bold">$' + Math.floor(item.price) + '</span>';
      html += '<span class="text-sm opacity-80">.' + ((item.price % 1).toFixed(2).slice(2) || '00') + '</span></div></div></div></div>';

      html += '<div class="p-5"><p class="text-sm text-cafe-500 leading-relaxed mb-4">' + desc + '</p>';
      html += '<div class="flex items-center gap-4 text-xs text-cafe-400">';
      html += '<span class="flex items-center gap-1.5"><i class="fas fa-clock text-cafe-300"></i> ' + time1 + '-' + time2 + ' ' + (currentLang === 'am' ? 'ደቂቃ' : 'min') + '</span>';
      html += '<span class="flex items-center gap-1.5"><i class="fas fa-fire text-cafe-300"></i> ' + kcal + ' ' + (currentLang === 'am' ? 'ካሎሪ' : 'kcal') + '</span>';
      html += '<span class="flex items-center gap-1.5 ml-auto"><i class="fas fa-star text-amber-400"></i> ' + rating + '</span></div></div></div>';
      return html;
    }

    function addFavoriteHandlers() {
      var btns = document.querySelectorAll('.fav-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener('click', function(e) {
          e.stopPropagation();
          toggleFavorite(this.getAttribute('data-id'));
        });
      }
    }

    function addImageClickHandlers() {
      var imgs = document.querySelectorAll('.menu-item-img');
      for (var i = 0; i < imgs.length; i++) {
        imgs[i].addEventListener('click', function() {
          openImageViewer(this.getAttribute('data-src'));
        });
      }
    }

    function emptyState(icon, title, subtitle) {
      return '<div class="flex flex-col items-center justify-center py-20 text-center">' +
        '<div class="w-20 h-20 rounded-3xl bg-cafe-50 flex items-center justify-center mb-5"><i class="fas ' + icon + ' text-3xl text-cafe-300"></i></div>' +
        '<h3 class="font-serif text-xl font-bold text-cafe-600 mb-2">' + title + '</h3>' +
        '<p class="text-sm text-cafe-400 max-w-[260px]">' + subtitle + '</p></div>';
    }

    // ========== ACTIONS ==========
    function switchTab(tab) {
      currentTab = tab;
      var items = document.querySelectorAll('.nav-item');
      for (var i = 0; i < items.length; i++) {
        var el = items[i];
        var isActive = el.getAttribute('data-tab') === tab;
        var iconDiv = el.querySelector('div');
        var textSpan = el.querySelector('span');
        if (isActive) {
          iconDiv.className = 'w-10 h-10 rounded-full flex items-center justify-center bg-cafe-700 text-cream shadow-lg';
          textSpan.className = 'text-[10px] font-semibold text-cafe-700';
        } else {
          iconDiv.className = 'w-10 h-10 rounded-full flex items-center justify-center bg-cafe-100 text-cafe-400';
          textSpan.className = 'text-[10px] font-medium text-cafe-400';
        }
      }
      renderContent();
    }

    function setCategory(catId) {
      currentCategory = catId;
      renderCategories();
      renderContent();
    }

    function toggleFavorite(id) {
      for (var i = 0; i < menuItems.length; i++) {
        if (menuItems[i].id === id) {
          menuItems[i].favorite = !menuItems[i].favorite;
          break;
        }
      }
      renderContent();
    }

    // ========== MODALS ==========
    function openModal(id) {
      var modal = document.getElementById(id);
      if (modal) modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
      var modal = document.getElementById(id);
      if (modal) modal.classList.add('hidden');
      document.body.style.overflow = '';
      if (id === 'itemModal') {
        editingId = null;
        document.getElementById('itemForm').reset();
        removeImage();
      }
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('itemForm').reset();
      removeImage();
      document.getElementById('modalTitle').textContent = currentLang === 'am' ? 'ዕቃ ጨምር' : 'Add Item';
      openModal('itemModal');
    }

    function openEditModal(id) {
      var item = null;
      for (var i = 0; i < menuItems.length; i++) {
        if (menuItems[i].id === id) { item = menuItems[i]; break; }
      }
      if (!item) return;
      editingId = id;
      document.getElementById('itemId').value = id;
      document.getElementById('itemNameEn').value = item.nameEn;
      document.getElementById('itemNameAm').value = item.nameAm;
      document.getElementById('itemPrice').value = item.price;
      document.getElementById('itemCategory').value = item.category;
      document.getElementById('itemDescEn').value = item.descEn;
      document.getElementById('itemDescAm').value = item.descAm;
      document.getElementById('itemBadge').value = item.badge;
      document.getElementById('itemEmoji').value = item.emoji;

      // Load image if exists
      if (item.image) {
        currentImageBase64 = item.image;
        showImagePreview(item.image);
        document.getElementById('itemImageUrl').value = item.image.startsWith('http') ? item.image : '';
      } else {
        removeImage();
      }

      document.getElementById('modalTitle').textContent = currentLang === 'am' ? 'ዕቃ አስተካክል' : 'Edit Item';
      openModal('itemModal');
    }

    // ========== FORMS ==========
    function saveItem(e) {
      e.preventDefault();
      var itemData = {
        id: editingId || Date.now().toString(),
        nameEn: document.getElementById('itemNameEn').value,
        nameAm: document.getElementById('itemNameAm').value,
        price: parseFloat(document.getElementById('itemPrice').value),
        category: document.getElementById('itemCategory').value,
        descEn: document.getElementById('itemDescEn').value,
        descAm: document.getElementById('itemDescAm').value,
        badge: document.getElementById('itemBadge').value,
        emoji: document.getElementById('itemEmoji').value || '🍽️',
        image: currentImageBase64,
        favorite: false
      };
      if (editingId) {
        for (var i = 0; i < menuItems.length; i++) {
          if (menuItems[i].id === editingId) {
            itemData.favorite = menuItems[i].favorite;
            menuItems[i] = itemData;
            break;
          }
        }
      } else {
        menuItems.push(itemData);
      }
      closeModal('itemModal');
      renderContent();
    }

    function deleteItem(id) {
      if (confirm(currentLang === 'am' ? 'ይህን ዕቃ መሰረዝ ይፈልጋሉ?' : 'Delete this item?')) {
        var newItems = [];
        for (var i = 0; i < menuItems.length; i++) {
          if (menuItems[i].id !== id) newItems.push(menuItems[i]);
        }
        menuItems = newItems;
        renderContent();
      }
    }

    function authenticate(e) {
      e.preventDefault();
      if (document.getElementById('ownerPassword').value === '1234') {
        isOwner = true;
        closeModal('authModal');
        renderContent();
      } else {
        alert(currentLang === 'am' ? 'የተሳሳተ የይለፍ ቃል!' : 'Wrong password!');
      }
    }

    // ========== LANGUAGE ==========
    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'am' : 'en';
      var btn = document.getElementById('langToggleBtn');
      btn.textContent = currentLang === 'am' ? 'AM' : 'EN';

      var translatableElements = document.querySelectorAll('[data-en][data-am]');
      for (var i = 0; i < translatableElements.length; i++) {
        var el = translatableElements[i];
        var newText = currentLang === 'am' ? el.getAttribute('data-am') : el.getAttribute('data-en');
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.placeholder = newText;
        } else {
          el.textContent = newText;
        }
      }

      document.documentElement.lang = currentLang === 'am' ? 'am' : 'en';

      renderCategories();
      renderContent();
    }

    // ========== START ==========
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
