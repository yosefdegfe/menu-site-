<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Le Petit Café — Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'serif'],
            sans: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            cafe: {
              50: '#fdf8f3',
              100: '#f5e6d3',
              200: '#e8c9a8',
              300: '#d4a574',
              400: '#c28a52',
              500: '#a66d3a',
              600: '#8b5a2b',
              700: '#6b4423',
              800: '#4a2e17',
              900: '#2d1a0b',
              950: '#1a0f06',
            },
            cream: '#faf6f1',
            parchment: '#f0e6d6',
            espresso: '#3d2314',
            latte: '#c4956a',
            mocha: '#8b6914',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: #faf6f1; }
    .font-serif { font-family: 'Cormorant Garamond', serif; }
    .font-sans { font-family: 'DM Sans', sans-serif; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .card-hover { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .card-hover:hover, .card-hover:active { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(61,35,20,0.15); }
    .img-overlay::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(61,35,20,0.6) 0%, transparent 50%); pointer-events: none; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .glass { background: rgba(250, 246, 241, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    [dir="rtl"] .rtl-flip { transform: scaleX(-1); }
  </style>
<base target="_blank">
</head>
<body class="antialiased text-espresso">

  <!-- Splash Screen -->
  <div id="splash" class="fixed inset-0 z-[9999] bg-cafe-950 flex flex-col items-center justify-center transition-opacity duration-700">
    <div class="relative mb-8">
      <div class="w-28 h-28 rounded-full bg-gradient-to-br from-latte to-cafe-600 flex items-center justify-center shadow-2xl shadow-cafe-900/50 animate-pulse">
        <i class="fas fa-mug-hot text-4xl text-cream"></i>
      </div>
      <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-cafe-500 rounded-full flex items-center justify-center shadow-lg">
        <i class="fas fa-star text-xs text-cream"></i>
      </div>
    </div>
    <h1 class="font-serif text-4xl text-cream mb-2 tracking-wide">Le Petit Café</h1>
    <p class="text-cafe-300 text-sm tracking-[0.3em] uppercase font-light">Est. 2016</p>
    <div class="mt-12 flex gap-2">
      <div class="w-2 h-2 rounded-full bg-latte animate-bounce" style="animation-delay:0s"></div>
      <div class="w-2 h-2 rounded-full bg-latte animate-bounce" style="animation-delay:0.2s"></div>
      <div class="w-2 h-2 rounded-full bg-latte animate-bounce" style="animation-delay:0.4s"></div>
    </div>
  </div>

  <div class="max-w-md mx-auto min-h-screen relative bg-cream">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-cafe-100/50">
      <div class="px-5 pt-4 pb-3">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-cafe-600 to-cafe-800 flex items-center justify-center shadow-lg shadow-cafe-600/20">
              <i class="fas fa-mug-hot text-cream text-lg"></i>
            </div>
            <div>
              <h1 class="font-serif text-xl font-bold text-espresso leading-tight" data-en="Le Petit Café" data-am="ል ፔቲ ካፌ">Le Petit Café</h1>
              <p class="text-[10px] text-cafe-400 tracking-[0.2em] uppercase font-medium" data-en="Artisan Coffee & Kitchen" data-am="የባህር ካፌ እና ወጥ">Artisan Coffee & Kitchen</p>
            </div>
          </div>
          <button onclick="openSettings()" class="w-10 h-10 rounded-full bg-white/80 border border-cafe-100 flex items-center justify-center text-cafe-600 hover:bg-white transition-all shadow-sm">
            <i class="fas fa-cog text-sm"></i>
          </button>
        </div>

        <div id="categoryTabs" class="flex gap-2 overflow-x-auto hide-scroll pb-1"></div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="content" class="px-5 pt-5 pb-28"></main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md z-50 glass border-t border-cafe-100/50 px-6 py-2">
      <div class="flex justify-around items-center">
        <button onclick="switchTab('menu')" class="nav-item flex flex-col items-center gap-1 py-2 px-4 rounded-2xl transition-all" data-tab="menu">
          <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all bg-cafe-700 text-cream shadow-lg shadow-cafe-700/30">
            <i class="fas fa-utensils text-sm"></i>
          </div>
          <span class="text-[10px] font-semibold text-cafe-700" data-en="Menu" data-am="ምናሌ">Menu</span>
        </button>
        <button onclick="switchTab('favorites')" class="nav-item flex flex-col items-center gap-1 py-2 px-4 rounded-2xl transition-all" data-tab="favorites">
          <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all bg-cafe-100 text-cafe-400">
            <i class="fas fa-heart text-sm"></i>
          </div>
          <span class="text-[10px] font-medium text-cafe-400" data-en="Saved" data-am="የተቀመጡ">Saved</span>
        </button>
        <button onclick="switchTab('owner')" class="nav-item flex flex-col items-center gap-1 py-2 px-4 rounded-2xl transition-all" data-tab="owner">
          <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all bg-cafe-100 text-cafe-400">
            <i class="fas fa-lock text-sm"></i>
          </div>
          <span class="text-[10px] font-medium text-cafe-400" data-en="Owner" data-am="ባለቤት">Owner</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-espresso/60 backdrop-blur-sm transition-opacity" onclick="closeModal('settingsModal')"></div>
    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-cream rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300" id="settingsSheet">
      <div class="p-6">
        <div class="w-12 h-1 bg-cafe-200 rounded-full mx-auto mb-6"></div>
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif text-2xl font-bold text-espresso" data-en="Settings" data-am="ቅንብሮች">Settings</h2>
          <button onclick="closeModal('settingsModal')" class="w-9 h-9 rounded-full bg-cafe-100 flex items-center justify-center text-cafe-600 hover:bg-cafe-200 transition-all">
            <i class="fas fa-times text-sm"></i>
          </button>
        </div>

        <div class="space-y-4">
          <div class="bg-white rounded-2xl p-4 border border-cafe-100 shadow-sm">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-cafe-50 flex items-center justify-center text-cafe-600">
                  <i class="fas fa-globe"></i>
                </div>
                <div>
                  <h3 class="font-semibold text-sm text-espresso" data-en="Language" data-am="ቋንቋ">Language</h3>
                  <p class="text-xs text-cafe-400 mt-0.5" data-en="Choose your preferred language" data-am="የሚፈልጉትን ቋንቋ ይምረጡ">Choose your preferred language</p>
                </div>
              </div>
              <button onclick="toggleLanguage()" class="h-9 px-4 rounded-full bg-cafe-100 text-cafe-700 font-semibold text-xs hover:bg-cafe-200 transition-all" id="langBtn">EN</button>
            </div>
          </div>

          <div class="bg-white rounded-2xl p-4 border border-cafe-100 shadow-sm opacity-60">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-cafe-50 flex items-center justify-center text-cafe-600">
                <i class="fas fa-palette"></i>
              </div>
              <div>
                <h3 class="font-semibold text-sm text-espresso" data-en="Warm Theme" data-am="ሞቃት ጭብጥ">Warm Theme</h3>
                <p class="text-xs text-cafe-400 mt-0.5" data-en="Curated for cozy dining" data-am="ለመረጋጋት የተዘጋጀ">Curated for cozy dining</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-espresso/60 backdrop-blur-sm transition-opacity" onclick="closeModal('authModal')"></div>
    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-cream rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300" id="authSheet">
      <div class="p-6">
        <div class="w-12 h-1 bg-cafe-200 rounded-full mx-auto mb-6"></div>
        <div class="text-center mb-6">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-cafe-600 to-cafe-800 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-cafe-600/30">
            <i class="fas fa-shield-alt text-2xl text-cream"></i>
          </div>
          <h2 class="font-serif text-2xl font-bold text-espresso mb-1" data-en="Owner Access" data-am="የባለቤት መግቢያ">Owner Access</h2>
          <p class="text-sm text-cafe-400" data-en="Enter password to manage menu" data-am="ምናሌን ለማስተዳደር የይለፍ ቃል ያስገቡ">Enter password to manage menu</p>
        </div>

        <form onsubmit="authenticate(event)" class="space-y-4">
          <div class="relative">
            <input type="password" id="ownerPassword" required placeholder="••••" 
              class="w-full h-14 px-5 rounded-2xl bg-white border-2 border-cafe-100 text-center text-2xl tracking-[0.5em] font-bold text-espresso placeholder:text-cafe-200 focus:border-cafe-400 focus:outline-none transition-all">
          </div>
          <p class="text-xs text-cafe-400 text-center" data-en="Default password: 1234" data-am="ነባሪ የይለፍ ቃል፡ 1234">Default password: 1234</p>
          <button type="submit" class="w-full h-14 rounded-2xl bg-gradient-to-r from-cafe-600 to-cafe-700 text-cream font-semibold text-lg shadow-lg shadow-cafe-600/30 hover:shadow-xl hover:shadow-cafe-600/40 transition-all active:scale-[0.98]">
            <i class="fas fa-unlock mr-2"></i>
            <span data-en="Unlock" data-am="ክፈት">Unlock</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="itemModal" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-espresso/60 backdrop-blur-sm transition-opacity" onclick="closeModal('itemModal')"></div>
    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-cream rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 max-h-[90vh] overflow-hidden flex flex-col" id="itemSheet">
      <div class="p-6 overflow-y-auto">
        <div class="w-12 h-1 bg-cafe-200 rounded-full mx-auto mb-6"></div>
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-serif text-2xl font-bold text-espresso" id="modalTitle" data-en="Add Item" data-am="አዲስ ዕቃ አስገባ">Add Item</h2>
          <button onclick="closeModal('itemModal')" class="w-9 h-9 rounded-full bg-cafe-100 flex items-center justify-center text-cafe-600 hover:bg-cafe-200 transition-all">
            <i class="fas fa-times text-sm"></i>
          </button>
        </div>

        <form id="itemForm" onsubmit="saveItem(event)" class="space-y-4">
          <input type="hidden" id="itemId">

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Name (EN)" data-am="ስም (EN)">Name (EN)</label>
              <input type="text" id="itemNameEn" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm text-espresso placeholder:text-cafe-300 focus:border-cafe-400 focus:outline-none transition-all">
            </div>
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Name (AM)" data-am="ስም (AM)">Name (AM)</label>
              <input type="text" id="itemNameAm" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm text-espresso placeholder:text-cafe-300 focus:border-cafe-400 focus:outline-none transition-all">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Price" data-am="ዋጋ">Price</label>
              <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-cafe-400 font-bold">$</span>
                <input type="number" id="itemPrice" step="0.01" required class="w-full h-12 pl-8 pr-4 rounded-xl bg-white border border-cafe-100 text-sm text-espresso placeholder:text-cafe-300 focus:border-cafe-400 focus:outline-none transition-all">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Category" data-am="ምድብ">Category</label>
              <select id="itemCategory" required class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm text-espresso focus:border-cafe-400 focus:outline-none transition-all appearance-none">
                <option value="starters" data-en="Starters" data-am="መነሻዎች">Starters</option>
                <option value="mains" data-en="Main Course" data-am="ዋና ምግቦች">Main Course</option>
                <option value="desserts" data-en="Desserts" data-am="ጣፋጮች">Desserts</option>
                <option value="drinks" data-en="Drinks" data-am="መጠጦች">Drinks</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Description (EN)" data-am="መግለጫ (EN)">Description (EN)</label>
            <textarea id="itemDescEn" required rows="2" class="w-full px-4 py-3 rounded-xl bg-white border border-cafe-100 text-sm text-espresso placeholder:text-cafe-300 focus:border-cafe-400 focus:outline-none transition-all resize-none"></textarea>
          </div>

          <div>
            <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Description (AM)" data-am="መግለጫ (AM)">Description (AM)</label>
            <textarea id="itemDescAm" required rows="2" class="w-full px-4 py-3 rounded-xl bg-white border border-cafe-100 text-sm text-espresso placeholder:text-cafe-300 focus:border-cafe-400 focus:outline-none transition-all resize-none"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Badge" data-am="ምልክት">Badge</label>
              <select id="itemBadge" class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm text-espresso focus:border-cafe-400 focus:outline-none transition-all appearance-none">
                <option value="" data-en="None" data-am="ምንም">None</option>
                <option value="new" data-en="New" data-am="አዲስ">New ⭐</option>
                <option value="hot" data-en="Hot" data-am="በጣም የተወደደ">Hot 🔥</option>
                <option value="veg" data-en="Veg" data-am="የጤና ምግብ">Veg 🌿</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-cafe-600 mb-1.5 uppercase tracking-wider" data-en="Icon" data-am="አዶ">Icon</label>
              <input type="text" id="itemEmoji" maxlength="2" value="🍽️" class="w-full h-12 px-4 rounded-xl bg-white border border-cafe-100 text-sm text-center text-2xl focus:border-cafe-400 focus:outline-none transition-all">
            </div>
          </div>

          <button type="submit" class="w-full h-14 rounded-2xl bg-gradient-to-r from-cafe-600 to-cafe-700 text-cream font-semibold shadow-lg shadow-cafe-600/30 hover:shadow-xl transition-all active:scale-[0.98] mt-2">
            <i class="fas fa-check mr-2"></i>
            <span data-en="Save Item" data-am="ዕቃውን አስቀምጥ">Save Item</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ==================== DATA & STATE ====================
    let currentLang = localStorage.getItem('cafeLang') || 'en';
    let currentTab = 'menu';
    let currentCategory = 'all';
    let isOwner = false;
    let editingId = null;

    const categories = [
      { id: 'all', en: 'All', am: 'ሁሉም', icon: 'fa-th-large' },
      { id: 'starters', en: 'Starters', am: 'መነሻዎች', icon: 'fa-leaf' },
      { id: 'mains', en: 'Mains', am: 'ዋና ምግቦች', icon: 'fa-drumstick-bite' },
      { id: 'desserts', en: 'Desserts', am: 'ጣፋጮች', icon: 'fa-ice-cream' },
      { id: 'drinks', en: 'Drinks', am: 'መጠጦች', icon: 'fa-mug-hot' }
    ];

    let menuItems = JSON.parse(localStorage.getItem('cafeMenuItems')) || [
      {
        id: '1', nameEn: 'Truffle Mushroom Cappuccino', nameAm: 'ትሩፍል ማሽሩም ካፑቺኖ',
        price: 14, category: 'starters',
        descEn: 'Wild mushroom velouté with black truffle foam, toasted sourdough croutons, and micro herbs. A warm embrace in a bowl.',
        descAm: 'የባህር ማሽሩም ቬሉቴ ከጥቁር ትሩፍል ፎም፣ የተጠበሰ ሳውርዶው ክሩቶን እና ማይክሮ ሄርብስ ጋር። በብረታብረት ውስጥ የሞቀ ቅብብል።',
        badge: 'hot', emoji: '🍄', favorite: false
      },
      {
        id: '2', nameEn: 'Burrata & Heirloom Tomato', nameAm: 'ቡራታ እና ትሮሊሞ ቶማቶ',
        price: 18, category: 'starters',
        descEn: 'Creamy Puglian burrata, vine-ripened heirloom tomatoes, aged balsamic, extra virgin olive oil, and fresh basil.',
        descAm: 'ክሬሚ ፑግሊያን ቡራታ፣ በወይን ላይ የበሰለ ትሮሊሞ ቶማቶ፣ የዕድሜ የገሰሰ ባልሳሚክ፣ ኤክስትራ ቨርጂን ዘይት እና ጣፋጭ ባዚል።',
        badge: 'veg', emoji: '🍅', favorite: false
      },
      {
        id: '3', nameEn: 'Wagyu Beef Burger', nameAm: 'ዋጉ የበሬ ሥጋ ብርገር',
        price: 32, category: 'mains',
        descEn: 'A5 Wagyu patty, brioche bun, aged cheddar, caramelized onion jam, truffle mayo, and hand-cut parmesan fries.',
        descAm: 'A5 ዋጉ ፓቲ፣ ብሪኦሽ ዳቦ፣ የዕድሜ የገሰሰ ቼዳር፣ የታከመ የሽንኩርት ጃም፣ ትሩፍል ማዮ እና በእጅ የተቆረጠ ፓርሜዛን ፍራይ።',
        badge: 'hot', emoji: '🍔', favorite: false

    function emptyState(icon, title, subtitle) {

          <h3 class="font-serif text-xl font-bold text-cafe-600 mb-2">${title}</h3>

        </div>
      `;
    }

    // ==================== ACTIONS ====================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-item').forEach(el => {
        const isActive = el.dataset.tab === tab;
        const iconDiv = el.querySelector('div');
        const textSpan = el.querySelector('span');

        if (isActive) {
          iconDiv.className = 'w-10 h-10 rounded-full flex items-center justify-center transition-all bg-cafe-700 text-cream shadow-lg shadow-cafe-700/30';
          textSpan.className = 'text-[10px] font-semibold text-cafe-700';
        } else {
          iconDiv.className = 'w-10 h-10 rounded-full flex items-center justify-center transition-all bg-cafe-100 text-cafe-400';
          textSpan.className = 'text-[10px] font-medium text-cafe-400';
        }
      });
      renderContent();
    }

    function setCategory(catId) {
      currentCategory = catId;
      renderCategories();
      renderContent();
    }

    function toggleFavorite(id) {
      const item = menuItems.find(i => i.id === id);
      if (item) {
        item.favorite = !item.favorite;
        saveData();
        renderContent();
      }
    }

    // ==================== MODALS ====================
    function openModal(id) {
      const modal = document.getElementById(id);
      const sheet = modal.querySelector('[id$="Sheet"]');
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(() => {
        sheet.style.transform = 'translateY(0)';
      });
    }

    function closeModal(id) {
      const modal = document.getElementById(id);
      const sheet = modal.querySelector('[id$="Sheet"]');
      sheet.style.transform = 'translateY(100%)';
      setTimeout(() => {
        modal.classList.add('hidden');
        document.body.style.overflow = '';
      }, 300);

      if (id === 'itemModal') {
        editingId = null;
        document.getElementById('itemForm').reset();
      }
    }

    function openSettings() { openModal('settingsModal'); }

    function openAddModal() {
      editingId = null;
      document.getElementById('itemForm').reset();
      document.getElementById('modalTitle').textContent = currentLang === 'am' ? 'አዲስ ዕቃ አስገባ' : 'Add Item';
      openModal('itemModal');
    }

    function openEditModal(id) {
      const item = menuItems.find(i => i.id === id);
      if (!item) return;

      editingId = id;
      document.getElementById('itemId').value = id;
      document.getElementById('itemNameEn').value = item.nameEn;
      document.getElementById('itemNameAm').value = item.nameAm;
      document.getElementById('itemPrice').value = item.price;
      document.getElementById('itemCategory').value = item.category;
      document.getElementById('itemDescEn').value = item.descEn;
      document.getElementById('itemDescAm').value = item.descAm;
      document.getElementById('itemBadge').value = item.badge;
      document.getElementById('itemEmoji').value = item.emoji;

      document.getElementById('modalTitle').textContent = currentLang === 'am' ? 'ዕቃውን አስተካክል' : 'Edit Item';
      openModal('itemModal');
    }

    // ==================== FORM HANDLERS ====================
    function saveItem(e) {
      e.preventDefault();

      const itemData = {
        id: editingId || Date.now().toString(),
        nameEn: document.getElementById('itemNameEn').value,
        nameAm: document.getElementById('itemNameAm').value,
        price: parseFloat(document.getElementById('itemPrice').value),
        category: document.getElementById('itemCategory').value,
        descEn: document.getElementById('itemDescEn').value,
        descAm: document.getElementById('itemDescAm').value,
        badge: document.getElementById('itemBadge').value,
        emoji: document.getElementById('itemEmoji').value || '🍽️',
        favorite: editingId ? (menuItems.find(i => i.id === editingId)?.favorite || false) : false
      };

      if (editingId) {
        const idx = menuItems.findIndex(i => i.id === editingId);
        if (idx !== -1) menuItems[idx] = itemData;
      } else {
        menuItems.push(itemData);
      }

      saveData();
      closeModal('itemModal');
      renderContent();
    }

    function deleteItem(id) {
      const confirmText = currentLang === 'am' ? 'ይህን ዕቃ ለመሰረዝ እርግጠኛ ነዎት?' : 'Delete this item permanently?';
      if (confirm(confirmText)) {
        menuItems = menuItems.filter(i => i.id !== id);
        saveData();
        renderContent();
      }
    }

    function authenticate(e) {
      e.preventDefault();
      if (document.getElementById('ownerPassword').value === '1234') {
        isOwner = true;
        closeModal('authModal');
        renderContent();
      } else {
        alert(currentLang === 'am' ? 'የይለፍ ቃል ተሳስቷል!' : 'Wrong password!');
      }
    }

    // ==================== LANGUAGE ====================
    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'am' : 'en';
      const btn = document.getElementById('langBtn');

      if (currentLang === 'am') {
        btn.textContent = 'AM';
        document.dir = 'rtl';
      } else {
        btn.textContent = 'EN';
        document.dir = 'ltr';
      }

      localStorage.setItem('cafeLang', currentLang);
      updateLanguage();
      renderCategories();
      renderContent();
    }

    function updateLanguage() {
      document.querySelectorAll('[data-en][data-am]').forEach(el => {
        el.textContent = el.getAttribute(`data-${currentLang}`);
      });
    }

    function saveData() {
      localStorage.setItem('cafeMenuItems', JSON.stringify(menuItems));
    }
  </script>
</body>
</html>
